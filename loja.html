<!DOCTYPE html>
<html lang="pt-br" class="tenant-loading">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Loja | RiverTech</title>
    <meta name="description" content="Confira nossos produtos disponíveis com variações de tamanho e cor.">
    <style>
        html.tenant-loading body > :not(.tenant-loader) {
            opacity: 0 !important;
            pointer-events: none !important;
            user-select: none !important;
        }
        html.tenant-loading .tenant-loader {
            position: fixed !important;
            inset: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: #080808 !important;
            color: #fff !important;
            z-index: 99999 !important;
        }
        html.tenant-ready .tenant-loader {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 180ms ease-in !important;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loja-publica.css">
</head>

<body>

    <!-- Header -->
    <header class="loja-header">
        <div class="loja-header-inner">
            <div class="loja-brand">
                <img class="loja-brand-logo logo-main" id="logoEmpresa" src="" alt="Logo" style="display:none;">
                <div>
                    <h1 class="brand-name" id="brandName">Loja</h1>
                    <div class="loja-brand-subtitle brand-subtitle"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Container Principal -->
    <main class="loja-container">

        <!-- Filtros -->
        <div class="loja-pub-filtros">
            <select id="filtroCategoria">
                <option value="">Todas categorias</option>
            </select>
            <select id="filtroTamanho">
                <option value="">Todos tamanhos</option>
            </select>
            <select id="filtroCor">
                <option value="">Todas cores</option>
            </select>
            <button class="loja-pub-btn-limpar" onclick="limparFiltros()">✕ Limpar filtros</button>
        </div>

        <!-- Grid de Produtos -->
        <div class="loja-pub-grid" id="produtosGrid">
            <div class="vitrine-empty">
                <div class="vitrine-empty-icon">👗</div>
                <p>Carregando produtos...</p>
            </div>
        </div>

    </main>

    <!-- ══════════════════════════════════════════════
         MODAL PREMIUM DE PRODUTO
         ══════════════════════════════════════════════ -->
    <div class="modal-backdrop" id="modalProdutoBackdrop">
        <div class="modal-content" id="modalProdutoContent">

            <!-- Lado Esquerdo: Carrossel -->
            <div class="modal-left">
                <button class="modal-close" id="mp-close" aria-label="Fechar" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <div id="mp-carousel"></div>
            </div>

            <!-- Lado Direito: Informações -->
            <div class="modal-right">
                <div>
                    <span class="mp-categoria" id="mp-categoria"></span>
                    <h2 class="mp-nome" id="mp-nome">Produto</h2>
                </div>

                <p class="mp-descricao" id="mp-descricao"></p>

                <div class="mp-preco" id="mp-preco">R$ 0,00</div>

                <!-- Tamanhos -->
                <div class="mp-section">
                    <div class="mp-section-title">Tamanho</div>
                    <div class="mp-sizes" id="mp-tamanhos"></div>
                </div>

                <!-- Cores -->
                <div class="mp-section">
                    <div class="mp-section-title">Cor</div>
                    <div class="mp-colors" id="mp-cores"></div>
                </div>

                <!-- Estoque -->
                <div id="mp-estoque"></div>

                <!-- Botão Comprar -->
                <button class="mp-btn-comprar" id="mp-btn-comprar" disabled type="button">
                    <span id="mp-btn-texto">Selecione tamanho e cor</span>
                </button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="theme-manager.js"></script>
    <script src="tenant.js"></script>
    <script src="carousel.js"></script>
    <script src="modal-produto.js"></script>
    <script src="vitrine.js"></script>
</body>

</html>
